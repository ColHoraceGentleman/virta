<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Virta Books — Setup &amp; Categories Wireframes</title>
<style>
  :root {
    --bg:#f7f7f5;--panel:#fff;--ink:#1f2937;--ink-soft:#4b5563;--muted:#6b7280;
    --line:#e5e7eb;--line-strong:#cbd5e1;--accent:#2f7d4f;--accent-soft:#d8efe2;
    --warn:#b45309;--warn-soft:#fdecd2;--danger:#b91c1c;--danger-soft:#fde2e2;
    --info:#1d4ed8;--info-soft:#e0e9ff;--badge:#fef3c7;--badge-ink:#92400e;
    --shadow:0 1px 2px rgba(15,23,42,.04),0 8px 24px rgba(15,23,42,.06);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;background:var(--bg);color:var(--ink)}
  a{color:var(--info);text-decoration:none}
  a:hover{text-decoration:underline}
  .app{display:grid;grid-template-columns:232px 1fr;min-height:100vh}
  .sidebar{background:#111827;color:#d1d5db;padding:18px 12px;border-right:1px solid #0b1220}
  .brand{display:flex;align-items:center;gap:8px;color:#fff;font-weight:600;margin-bottom:18px}
  .brand .logo{width:26px;height:26px;border-radius:7px;background:var(--accent);display:inline-flex;align-items:center;justify-content:center;font-size:14px}
  .nav{display:flex;flex-direction:column;gap:2px}
  .nav a{color:#d1d5db;padding:7px 10px;border-radius:7px;display:flex;align-items:center;gap:8px;font-size:13.5px}
  .nav a:hover{background:#1f2937;text-decoration:none}
  .nav a.active{background:#1f2937;color:#fff}
  .nav .sub{padding-left:26px;font-size:12.5px;color:#9ca3af;display:flex;justify-content:space-between}
  .nav .badge{background:var(--badge);color:var(--badge-ink);border-radius:999px;padding:1px 7px;font-size:11px;font-weight:600}
  .nav .review-pill{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:50%;background:var(--badge);color:var(--badge-ink);font-size:11px;font-weight:600;line-height:1;padding:0 4px}  /* D45: small circular Review Later badge */
  .tab-btn{font:inherit;cursor:pointer;background:transparent;border:0;border-bottom:2px solid transparent;padding:8px 14px;color:var(--ink-soft);font-size:13.5px;margin-bottom:-1px}
  .tab-btn.on{color:var(--ink);border-bottom-color:var(--accent);font-weight:500}
  .nav .section{color:#6b7280;font-size:11px;text-transform:uppercase;letter-spacing:.07em;margin:14px 8px 4px}
  main{padding:28px 36px}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .topbar h1{font-size:18px;margin:0;font-weight:600}
  .crumbs{color:var(--muted);font-size:12.5px}
  .wizard{background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);max-width:920px;margin:0 auto;overflow:hidden}
  .wizard header{padding:16px 22px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fafafa,#fff)}
  .wizard header .ttl{font-weight:600;font-size:15px}
  .wizard header .sub{color:var(--muted);font-size:12.5px;margin-top:2px}
  .progress{display:flex;align-items:center;gap:6px;margin-top:12px}
  .progress .dot{width:10px;height:10px;border-radius:50%;background:var(--line-strong)}
  .progress .dot.done{background:var(--accent)}
  .progress .dot.current{background:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
  .progress .bar{flex:1;height:3px;border-radius:99px;background:var(--line)}
  .progress .bar.fill{background:var(--accent)}
  .step-body{padding:22px;min-height:320px}
  .step-cta{display:flex;justify-content:space-between;gap:12px;padding:14px 22px;border-top:1px solid var(--line);background:#fafafa}
  .step-cta .right{display:flex;gap:8px}
  button,.btn{font:inherit;cursor:pointer;border-radius:8px;padding:7px 14px;border:1px solid var(--line-strong);background:#fff;color:var(--ink)}
  button:hover,.btn:hover{background:#f3f4f6}
  button.primary,.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  button.primary:hover,.btn.primary:hover{background:#27643f}
  button.ghost{border-color:transparent;background:transparent}
  button.ghost:hover{background:#f3f4f6}
  button[disabled]{opacity:.55;cursor:not-allowed}
  label{display:block;font-size:12.5px;color:var(--ink-soft);margin:12px 0 4px}
  label .req{color:var(--danger)}
  input[type="text"],input[type="date"],input[type="email"],textarea,select{width:100%;max-width:520px;padding:8px 10px;border:1px solid var(--line-strong);border-radius:7px;background:#fff;font:inherit;color:var(--ink)}
  input:focus,textarea:focus,select:focus{outline:2px solid var(--accent-soft);border-color:var(--accent)}
  .field-row{display:flex;gap:12px;flex-wrap:wrap}
  .field-row > div{flex:1;min-width:180px}
  .help{font-size:12px;color:var(--muted);margin-top:4px}
  .softwarn{background:var(--warn-soft);color:var(--warn);border-radius:7px;padding:10px 12px;font-size:13px;margin:8px 0 4px}
  .infobox{background:var(--info-soft);color:var(--info);border-radius:7px;padding:10px 12px;font-size:13px;margin:8px 0 4px}
  .radios{display:flex;gap:12px;flex-wrap:wrap}
  .radio-card{flex:1;min-width:220px;border:1px solid var(--line-strong);border-radius:9px;padding:12px 14px;cursor:pointer;background:#fff}
  .radio-card.selected{border-color:var(--accent);background:var(--accent-soft)}
  .radio-card.disabled{opacity:.55;cursor:not-allowed;background:#f3f4f6}
  .radio-card h4{margin:0 0 4px;font-size:14px}
  .radio-card p{margin:0;color:var(--ink-soft);font-size:12.5px}
  .radio-card .pill{display:inline-block;font-size:11px;font-weight:600;background:#e5e7eb;color:#374151;padding:1px 7px;border-radius:99px;margin-top:6px}
  .radio-card.disabled .pill{background:#fde68a;color:#92400e}
  .cat-table{width:100%;border-collapse:separate;border-spacing:0}
  .cat-table th,.cat-table td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cat-table{table-layout:fixed;width:100%}  /* D41: fixed column widths so editing a name doesn't reflow */
  .cat-table .col-code{width:80px}
  .cat-table .col-name{width:auto}
  .cat-table .col-taxline{width:auto}
  .cat-table .col-type{width:96px}
  .cat-table .col-txn{width:90px;text-align:right}
  .cat-table .col-actions{width:140px}
  .cat-table th{color:var(--ink-soft);font-weight:600;background:#fafafa;position:sticky;top:0;z-index:2;user-select:none}  /* D34: global sticky header for all .cat-table instances (wizard 2/3/4/5 + management) */
  .cat-table th.sortable{cursor:pointer}
  .cat-table th.sortable:hover{background:#f3f4f6}
  .cat-table th .arrow{margin-left:4px;color:var(--muted);font-size:10px}
  .cat-table th.active .arrow{color:var(--accent)}
  .cat-table tr:hover td{background:#fafafa}
  .cat-table .name input{width:220px;max-width:100%;padding:4px 6px}
  .cat-table .desc{color:var(--muted)}
  .cat-table .linecol{white-space:nowrap}
  .linecol .badge{background:#eef2ff;color:#3730a3;border-radius:99px;padding:1px 7px;font-size:11px;font-weight:600}
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:14px}
  .tabs button{border:0;border-bottom:2px solid transparent;background:transparent;padding:8px 14px;color:var(--ink-soft);font-weight:500}
  .tabs button.active{color:var(--accent);border-bottom-color:var(--accent)}
  tr.review-later td{background:#fffaf2}
  tr.review-later td:first-child::before{content:""}
  .settings{max-width:720px}
  .settings .row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}
  .settings h3{margin:18px 0 8px}
  .switch{width:36px;height:20px;background:var(--line-strong);border-radius:99px;position:relative;cursor:pointer;transition:background .15s}
  .switch::after{content:"";width:16px;height:16px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .15s}
  .switch.on{background:var(--accent)}
  .switch.on::after{transform:translateX(16px)}
  .modal-back{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:50}
  .modal-back.open{display:flex}
  .modal{background:#fff;border-radius:10px;width:540px;max-width:92vw;box-shadow:0 20px 60px rgba(15,23,42,.25);overflow:hidden}
  .modal header{padding:14px 18px;border-bottom:1px solid var(--line);font-weight:600}
  .modal .body{padding:16px 18px}
  .modal footer{padding:12px 18px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;background:#fafafa}
  .review-summary{display:grid;grid-template-columns:200px 1fr;gap:6px 16px}
  .review-summary dt{color:var(--muted);font-size:12.5px}
  .review-summary dd{margin:0;font-size:13.5px}
  .review-summary dd.empty{color:var(--muted);font-style:italic}
  .row-actions{display:flex;gap:4px;justify-content:flex-end}
  .icon-btn{background:transparent;border:0;padding:4px 6px;border-radius:6px;color:var(--ink-soft);cursor:pointer}
  .icon-btn:hover{background:#f3f4f6}
  .hide-btn,.delete-btn{font:inherit;cursor:pointer;border:1px solid var(--line-strong);background:#fff;color:var(--ink-soft);border-radius:6px;padding:4px 10px;font-size:12.5px}
  .hide-btn:hover{background:#f3f4f6;color:var(--ink)}
  .delete-btn{color:var(--danger);border-color:#fecaca}
  .delete-btn:hover{background:#fde2e2}
  .wiz-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px;flex-wrap:wrap}
  .wiz-toolbar .add-btn{font:inherit;cursor:pointer;background:var(--accent);color:#fff;border:0;border-radius:8px;padding:8px 14px;font-size:13.5px;font-weight:500}
  .wiz-toolbar .add-btn:hover{background:#27643f}
  .wiz-toolbar .accnum-toggle{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink-soft)}
  tr.is-hidden td{opacity:.45;text-decoration:line-through}
  /* D40: CTAs inside the scrollable table container, sticky-bottom — no double scroll */
  .step-window{position:relative;display:flex;flex-direction:column;border:1px solid var(--line);border-radius:8px;overflow:hidden;max-height:calc(100vh - 320px)}  /* D48: viewport-relative */
  .step-window .scroll{flex:1 1 auto;overflow:auto;min-height:0}
  .step-window .step-cta-inside{display:flex;justify-content:space-between;gap:12px;padding:12px 14px;border-top:1px solid var(--line);background:#fafafa;position:sticky;bottom:0;z-index:2}
  .step-window .step-cta-inside .right{display:flex;gap:8px}
  .chip{font:inherit;cursor:pointer;border:1px solid var(--line-strong);background:#fff;color:var(--ink-soft);border-radius:999px;padding:5px 12px;font-size:12.5px}
  .chip:hover{background:#f3f4f6}
  .chip-on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent);font-weight:500}
  .kicker{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  .pill{display:inline-block;font-size:11px;font-weight:600;background:#e5e7eb;color:#374151;padding:1px 7px;border-radius:99px}
  .pill.system{background:var(--info-soft);color:var(--info)}
  .pill.warn{background:var(--warn-soft);color:var(--warn)}
  .empty-state{text-align:center;padding:36px 12px;color:var(--muted)}
  .ledger-summary{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin:0 0 16px}
  .ledger-summary .metric{background:#fff;border:1px solid var(--line);border-radius:8px;padding:14px;box-shadow:var(--shadow)}
  .ledger-summary .metric .label{font-size:12px;color:var(--muted);margin-bottom:4px}
  .ledger-summary .metric .value{font-size:20px;font-weight:650}
  .ledger-table td:nth-child(6),.ledger-table td:nth-child(7){font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;color:#374151}
  .hidden{display:none}
  .grow{flex:1}
  .right{text-align:right}
  .muted{color:var(--muted)}
  .small{font-size:12.5px}
  .nowrap{white-space:nowrap}
  .crumb{padding:7px 12px;background:#f3f4f6;border-radius:6px;display:inline-block;margin-right:6px;font-size:12.5px}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><span class="logo">⚙️</span> Virta Books</div>
    <nav class="nav" id="sidebar">
      <a href="#" data-screen="dashboard" class="active">🏠 Dashboard</a>
      <a href="#" data-screen="invoices">🧾 Invoices</a>
      <a href="#" data-screen="transactions">💸 Transactions</a>
      <a href="#" onclick="state.screen='mgmt';state.catFilter='all';render()"><span>📂 Categories</span><span class="review-pill" id="reviewBadge" hidden>0</span></a>
      <div class="section">Setup</div>
      <a href="#" data-screen="setup">🚀 Run setup wizard</a>
      <a href="#" data-screen="settings">⚙️ Settings</a>
    </nav>
  </aside>
  <main id="root"></main>
</div>
<div class="modal-back" id="modalBack">
  <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
</div>
<script>
/* Virta Books — Setup & Categories wireframe state, data, and screens. */
const IRS_EXPENSE_LINES = [
  {id:'line-8',label:'Line 8',desc:'Advertising'},
  {id:'line-9',label:'Line 9',desc:'Car and truck expenses'},
  {id:'line-10',label:'Line 10',desc:'Commissions and fees'},
  {id:'line-11',label:'Line 11',desc:'Contract labor'},
  {id:'line-12',label:'Line 12',desc:'Depletion'},
  {id:'line-13',label:'Line 13',desc:'Depreciation'},
  {id:'line-14',label:'Line 14',desc:'Insurance'},
  {id:'line-15a',label:'Line 15a',desc:'Interest — mortgage'},
  {id:'line-15b',label:'Line 15b',desc:'Interest — other'},
  {id:'line-16a',label:'Line 16a',desc:'Legal and professional services'},
  {id:'line-16b',label:'Line 16b',desc:'Accounting'},
  {id:'line-17',label:'Line 17',desc:'Office expense'},
  {id:'line-18',label:'Line 18',desc:'Pension and profit-sharing'},
  {id:'line-19',label:'Line 19',desc:'Rent or lease'},
  {id:'line-20a',label:'Line 20a',desc:'Repairs and maintenance'},
  {id:'line-20b',label:'Line 20b',desc:'Supplies'},
  {id:'line-21',label:'Line 21',desc:'Taxes and licenses'},
  {id:'line-22',label:'Line 24a',desc:'Travel'},
  {id:'line-23',label:'Line 24b',desc:'Meals (50% deductible)'},
  {id:'line-24',label:'Line 25a',desc:'Utilities'},
  {id:'line-25b',label:'Line 25b',desc:'Telephone'},
  {id:'line-26',label:'Line 26',desc:'Wages'},
  {id:'line-27a',label:'Line 27a',desc:'Other expenses — pick for custom categories'}
];
const IRS_INCOME_LINES = [
  {id:'part-i-1',label:'Part I, Line 1',desc:'Gross receipts or sales'},
  {id:'part-i-7',label:'Part I, Line 7',desc:'Other income'}
];
const DEFAULT_EXPENSE = [
  {code:'6000',name:'Accounting',line:'line-16b'},
  {code:'6010',name:'Advertising',line:'line-8'},
  {code:'6020',name:'Car & Truck',line:'line-9'},
  {code:'6030',name:'Commissions',line:'line-10'},
  {code:'6040',name:'Contract Labor',line:'line-11'},
  {code:'6050',name:'Depletion',line:'line-12'},
  {code:'6060',name:'Depreciation',line:'line-13'},
  {code:'6070',name:'Insurance',line:'line-14'},
  {code:'6080',name:'Interest',line:'line-15b'},
  {code:'6090',name:'Legal & Professional',line:'line-16a'},
  {code:'6100',name:'Meals',line:'line-23'},
  {code:'6110',name:'Mortgage Interest',line:'line-15a'},
  {code:'6120',name:'Office Expense',line:'line-17'},
  {code:'6130',name:'Phone',line:'line-25b'},
  {code:'6140',name:'Rent',line:'line-19'},
  {code:'6150',name:'Repairs & Maintenance',line:'line-20a'},
  {code:'6160',name:'Retirement',line:'line-18'},
  {code:'6170',name:'Supplies',line:'line-20b'},
  {code:'6180',name:'Taxes & Licenses',line:'line-21'},
  {code:'6190',name:'Travel',line:'line-22'},
  {code:'6200',name:'Utilities',line:'line-24'},
  {code:'6210',name:'Wages',line:'line-26'},
  {code:'9999',name:'Review Later',line:null,system:true}
];
const DEFAULT_INCOME = [
  {code:'4000',name:'Sales',line:'part-i-1'},
  {code:'4010',name:'Refunds & Returns',line:'part-i-7'},
  {code:'4020',name:'Other Income',line:'part-i-1'}
];
const DEFAULT_OTHER = [
  {code:'1010',name:'Business Checking',type:'Asset',group:'Cash & bank'},
  {code:'1020',name:'Business Savings',type:'Asset',group:'Cash & bank'},
  {code:'1100',name:'Cash on Hand',type:'Asset',group:'Cash & bank'},
  {code:'2000',name:'Business Credit Card',type:'Liability',group:'Credit & loans'},
  {code:'2100',name:'Loans Payable',type:'Liability',group:'Credit & loans'},
  {code:'3000',name:'Owner Contributions',type:'Equity',group:'Equity'},
  {code:'3010',name:'Owner Draws',type:'Equity',group:'Equity'},
  {code:'3020',name:"Owner's Equity",type:'Equity',group:'Equity'}
];
const state = {
  setupStep:1,
  setup:{proprietor:'',business_name:'',trade_name:'',description:'',naics:'',addr1:'',addr2:'',city:'',state:'',zip:'',ein:'',accounting_method:'cash',fy_month:1,started_on:''},
  catsStep:1,
  expenses:DEFAULT_EXPENSE.map(e=>({...e,is_hidden:false,is_deleted:false,note:''})),
  income:DEFAULT_INCOME.map(e=>({...e,is_hidden:false,is_deleted:false,note:''})),
  other:DEFAULT_OTHER.map(e=>({...e,is_hidden:false,is_deleted:false,note:''})),
  /* per-table sort state; default = name asc */
  sortExpenses:{key:'name',dir:'asc'},
  sortIncome:{key:'none',dir:'asc'}, /* income has an intentional non-alphabetical default order (Sales, Refunds & Returns, Other Income); user can still click headers to sort */
  sortOther:{key:'name',dir:'asc'},
  showNumbers:false,
  catFilter:'all',       /* Categories Management single-page filter chip */
  catSearch:'',
  catShowHidden:false,
  catDefaultSort:'name', /* D27; default is Alphabetical by name (round 10; flips back from Numerical by code) */
  settingsTab:'general',  /* D49: settings page section tab (general|categories|other) */
  sortMgmt:null,         /* active sort on the management table; null = follow catDefaultSort */
  reviewLaterTxnCount:3,
  txnCounts:{'6000':12,'6100':4,'6500':7, '1000':1284.50, '1010':5300.00, '1100':42.00, '2000':-318.20, '2100':-12500.00, '3000':-8000.00, '3010':4200.00, '3020':-50.00}
};
const SETUP_STEPS=[
  {n:1,name:'Welcome',skippable:false},
  {n:2,name:'Basic business info',skippable:true},
  {n:3,name:'Contact',skippable:true},
  {n:4,name:'Accounting method',skippable:true},
  {n:5,name:'Timeline',skippable:true},
  {n:6,name:'Review',skippable:false}
];
const CATS_STEPS=[
  {n:1,name:'Welcome',skippable:false},
  {n:2,name:'Expense categories',skippable:true},
  {n:3,name:'Income categories',skippable:true},
  {n:4,name:'Other accounts',skippable:true},
  {n:5,name:'Review Later',skippable:false},
  {n:6,name:'Final review',skippable:false}
];
const LEDGER_ROWS=[
  {date:'2026-07-08',type:'Invoice',name:'Little Pine Quilt Co.',amount:1200,description:'Pattern licensing invoice INV-1001',category:{code:'4000',name:'Sales'},matched:{code:'1100',name:'Accounts Receivable'},recon:''},
  {date:'2026-07-09',type:'Payment',name:'Little Pine Quilt Co.',amount:1200,description:'Payment received for INV-1001',category:{code:'1000',name:'Business Checking'},matched:{code:'1100',name:'Accounts Receivable'},recon:'reconciled'},
  {date:'2026-07-10',type:'Bill',name:'Paper Trail Studio',amount:-86.42,description:'Office supplies bill BILL-018',category:{code:'6120',name:'Office Expense'},matched:{code:'2200',name:'Bills Payable'},recon:'in-progress'},
  {date:'2026-07-11',type:'Journal',name:'Owner',amount:-250,description:'Owner draw adjustment',category:{code:'3010',name:'Owner Draw'},matched:{code:'1000',name:'Business Checking'},recon:''}
];
const $=s=>document.querySelector(s);
const esc=s=>(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function lineLabel(id){const m=IRS_EXPENSE_LINES.find(x=>x.id===id)||IRS_INCOME_LINES.find(x=>x.id===id);return m?`${m.label} — ${m.desc}`:'—';}
function lineShort(id){const m=IRS_EXPENSE_LINES.find(x=>x.id===id)||IRS_INCOME_LINES.find(x=>x.id===id);return m?m.label:(id?id:'—');}
function accountLabel(acct){return state.showNumbers ? `${acct.code}-${acct.name}` : acct.name;}
function fmtAmount(v){const sign=v<0?'−':'';return sign+'$'+Math.abs(v).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');}
function accountOptionList(opts){
  const filterType = opts && opts.filterType;
  let all = [...state.income,...state.expenses,...state.other].filter(a=>!a.system);
  if(filterType) all = all.filter(a => a.type === filterType);
  return all.map(a=>`<option value="${esc(a.code)}" data-type="${esc(a.type)}">${esc(accountLabel(a))}</option>`).join('');
}
function refreshBadge(){const b=$('#reviewBadge');if(!b) return; const n = state.reviewLaterTxnCount||0; if(n>0){ b.hidden=false; b.textContent = String(n); } else { b.hidden = true; }}

function catRowInputs(prefix, list){
  return list.map(item => {
    const sysTag = item.system ? '<span class="pill system">system</span>' : '';
    const lnkBadge = item.line ? `<span class="badge">${esc(lineShort(item.line))}</span>` : '<span class="muted">—</span>';
    const numCell = state.showNumbers ? `<td><code>${item.code}</code></td>` : '';
    const i = state[prefix].indexOf(item);
    /* D36: Combined "Tax line" + "Descriptor" → one column "Tax Line Item". Format: "<badge> Line N </badge> <em>— IRS descriptor</em>" */
    const taxLineCell = prefix === 'other'
      ? '<span class="muted">—</span>'
      : (item.system
          ? '<span class="muted">—</span>'
          : (item.line ? `<span class="badge">${esc(lineShort(item.line))}</span> <span class="muted small">— ${esc(lineLabel(item.line).split(' — ')[1] || '')}</span>` : '<span class="muted">—</span>'));
    const editBtn = item.system
      ? '<span class="muted small">—</span>'
      : `<button class="icon-btn" title="Edit" onclick="window.__openEdit('${prefix}',${i})">✎</button>`;
    const hideBtn = item.system
      ? '<span class="muted small">—</span>'
      : (item.is_hidden
          ? `<button class="icon-btn" title="Show" onclick="window.__toggleHide('${prefix}',${i})">\u{1F441}</button>`
          : `<button class="icon-btn" title="Hide" onclick="window.__toggleHide('${prefix}',${i})">⊘</button>`);
    const deleteBtn = item.system
      ? '<span class="muted small">—</span>'
      : `<button class="icon-btn" title="Delete" onclick="window.__toggleDelete('${prefix}',${i})">🗑</button>`;
    const actions = `${editBtn} ${hideBtn} ${deleteBtn}`;
    const rowCls = `${item.system ? 'review-later ' : ''}${item.is_hidden ? 'is-hidden' : ''}`.trim();
    return `<tr class="${rowCls}">
      ${numCell}
      <td class="name"><strong>${esc(item.name)}</strong> ${sysTag}</td>
      <td class="linecol">${prefix==='other' ? `<span class="pill">${esc(item.type)}</span>` : taxLineCell}</td>
      <td class="row-actions" style="white-space:nowrap">${actions}</td>
    </tr>`;
  }).join('');
}

window.__toggleHide = (prefix,i)=>{ const arr = prefix==='expenses'?state.expenses:prefix==='income'?state.income:state.other; arr[i].is_hidden = !arr[i].is_hidden; markDirty(prefix); render(); };
/* D30/D33: Delete handler — stashes target on window so the modal's inline button can splice the right row.
   Stays simple; no monkey-patching of closeModal. */
window.__pendingDelete = null;
window.__toggleDelete = (prefix,i)=>{
  const arr = prefix==='expenses'?state.expenses:prefix==='income'?state.income:state.other;
  const name = (arr[i]||{}).name || 'this category';
  window.__pendingDelete = { prefix, i };

  ]);

window.__confirmDelete = ()=>{
  const p = window.__pendingDelete;
  window.__pendingDelete = null;
  if(!p) return;
  const arr = p.prefix==='expenses'?state.expenses:p.prefix==='income'?state.income:state.other;
  if(p.i < arr.length){ arr.splice(p.i, 1); markDirty(p.prefix); }
};
function sortedList(prefix, list){
  const sk = prefix==='expenses' ? state.sortExpenses : prefix==='income' ? state.sortIncome : state.sortOther;
  if(sk.key === 'none') return [...list]; /* preserve intentional insertion order until user clicks a header */
  const sysPinnedFirst = (a,b)=> (b.system?1:0) - (a.system?1:0);
  const by = (a,b) => {
    const va = (a[sk.key] ?? '').toString().toLowerCase();
    const vb = (b[sk.key] ?? '').toString().toLowerCase();
    if(va < vb) return sk.dir==='asc' ? -1 : 1;
    if(va > vb) return sk.dir==='asc' ?  1 : -1;
    return 0;
  };
  return [...list].sort((a,b)=> sysPinnedFirst(a,b) || by(a,b));
}
window.__sortBy = (prefix, key)=>{
  const sk = prefix==='expenses' ? state.sortExpenses : prefix==='income' ? state.sortIncome : state.sortOther;
  if(sk.key === key) sk.dir = sk.dir==='asc' ? 'desc' : 'asc';
  else { sk.key = key; sk.dir = 'asc'; }
  render();
};
function sortHeader(prefix, key, label){
  const sk = prefix==='expenses' ? state.sortExpenses : prefix==='income' ? state.sortIncome : state.sortOther;
  const active = sk.key === key; /* 'none' never matches a real key, so no column shows active until user clicks */
  const arrow = active ? (sk.dir==='asc' ? '↑' : '↓') : '↕';
  return `<th class="sortable ${active?'active':''}" onclick="window.__sortBy('${prefix}','${key}')">${esc(label)}<span class="arrow">${arrow}</span></th>`;
}

/* Phase 1 design cleanup (2026-07-08): removed dead mgmtRow() function — it was superseded by
   mgmtUnifiedRow() below in an earlier round but never deleted. It referenced a separate "Disable"
   action that conflicted with D55 (one hidden-flag only, no second active-status flag).
   mgmtUnifiedRow already correctly uses the single Hide/Show toggle. */
function mgmtUnifiedRow(prefix, item, i){
  const sysTag = item.system ? '<span class="pill system">system</span>' : '';
  const numCell = state.showNumbers ? `<td><code>${item.code}</code></td>` : '';
  const typeCell = prefix==='other'
    ? `<td>${esc(item.type)}</td>`
    : (prefix==='income' ? '<td>Income</td>' : '<td>Expense</td>');
  /* D36: combined Tax Line Item — badge + descriptor in one cell */
  const taxLineCell = prefix==='other'
    ? '<span class="muted">—</span>'
    : (item.line ? `<span class="badge">${esc(lineShort(item.line))}</span> <span class="muted small">— ${esc(lineLabel(item.line).split(' — ')[1] || '')}</span>` : '<span class="muted">—</span>');
  /* Round 9: replace Transactions column with Balance. Flow-based accounts (Income / Expense) show
     — because they accumulate over time, not hold a balance; Asset / Liability / Equity show the
     current balance (formatted with thousands separator and sign-aware minus). */
  const isFlow = prefix==='expenses' || prefix==='income';
  const balanceCell = isFlow
    ? '<td class="right nowrap muted">—</td>'
    : (() => { const b = state.txnCounts[item.code]; return `<td class="right nowrap">${b==null?'<span class="muted">—</span>':(b<0?'−':'') + '$' + Math.abs(b).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',')}</td>`; })();
  const rowCls = `${item.system?'review-later ':''}${item.is_hidden?'is-hidden':''}`.trim();
  const actions = item.system
    ? '<span class="muted small">System</span>'
    : `<button class="icon-btn" title="Edit" onclick="window.__openEdit('${prefix}',${i})">✎</button>
      <button class="icon-btn" title="${item.is_hidden?'Show':'Hide'}" onclick="window.__toggleHide('${prefix}',${i})">${item.is_hidden?'\u{1F441}':'⊘'}</button>
      <button class="icon-btn" title="Delete" onclick="window.__openDelete('${prefix}',${i})">🗑</button>`;
  /* Round 12: Code column renders first (leftmost) when shown — was second after Name. */
  return `<tr class="${rowCls}">
    ${numCell}
    <td class="name"><strong>${esc(item.name)}</strong> ${sysTag}</td>
    ${typeCell}
    <td class="linecol">${taxLineCell}</td>
    ${balanceCell}
    <td class="row-actions" style="white-space:nowrap">${actions}</td>
  </tr>`;
}

    ${codeField}
    <div id="m-line-wrap" ${showLineWrap?'':'style="display:none"'}>
      <label>Tax Line Item (Schedule C of IRS Form 1040) <span class="req">*</span></label>
      <select id="m-line">${buildLineOpts(typeDefault)}</select>
    </div>
    <label>Notes</label>
    <textarea id="m-note" rows="2" placeholder="What is this category used for? (e.g. Dues paid to local trade association)"></textarea>
  `, [{Cancel:'closeModal()'}, {Save:'window.__commitAdd();'}]);
};
window.__commitAdd = ()=>{
  const type = (window.document.querySelector('#m-type')||{}).value || 'Expense';
  const name = (window.document.querySelector('#m-name')||{}).value || '';
  /* D46: code only when account numbers are on; auto-suggest next 4-digit if blank */
  const codeEl = window.document.querySelector('#m-code');
  let code = codeEl ? codeEl.value : '';
  if(state.showNumbers && !code){
    const existing = type==='Income' ? state.income : type==='Expense' ? state.expenses : state.other;
    const next = existing.length ? Math.max(...existing.map(r => Number(r.code)||0)) + 10 : (type==='Expense'?6000:type==='Income'?4000:1000);
    code = String(next);
  }
  const noteEl = window.document.querySelector('#m-note');
  const note = noteEl ? noteEl.value : '';
  const lineEl = window.document.querySelector('#m-line');
  const line = lineEl ? lineEl.value : null;
  if(!name){ closeModal(); return; }
  const row = { name, note, is_hidden:false, is_deleted:false };
  if(state.showNumbers) row.code = code;
  if(type==='Expense'){ row.line = line; state.expenses.push(row); markDirty('expenses'); }
  else if(type==='Income'){ row.line = line; state.income.push(row); markDirty('income'); }
  else { row.type = type; row.group = type==='Asset' ? 'Cash & bank' : (type==='Liability' ? 'Credit & loans' : 'Equity'); state.other.push(row); markDirty('other'); }
  closeModal();
  render();
};
window.__buildLineOpts = (type)=>{
  const src = type==='Income' ? IRS_INCOME_LINES : type==='Expense' ? IRS_EXPENSE_LINES : [];
  return src.map(l=>`<option value="${l.id}">${l.label} — ${l.desc}</option>`).join('');
};
/* D33: dirty tracking + revert helpers (Skip → Revert to Defaults when state has changed) */
function markDirty(prefix){
  if(prefix==='expenses') state._step2Dirty = true;
  else if(prefix==='income') state._step3Dirty = true;
  else if(prefix==='other') state._step4Dirty = true;
  else if(prefix==='add') { state._step2Dirty = state._step3Dirty = state._step4Dirty = true; }
  /* renames + add-from-modal set explicit dirty */
}
window.revertExpenses = ()=>{
  state.expenses = DEFAULT_EXPENSE.map(e=>({...e,is_hidden:false,is_deleted:false,note:''}));
  state._step2Dirty = false;
};
window.revertIncome = ()=>{
  state.income = DEFAULT_INCOME.map(e=>({...e,is_hidden:false,is_deleted:false,note:''}));
  state._step3Dirty = false;
};
window.revertOther = ()=>{
  state.other = DEFAULT_OTHER.map(e=>({...e,is_hidden:false,is_deleted:false,note:''}));
  state._step4Dirty = false;
};

/* D35 + D37 + D38 + D39: Edit Account modal — generic, used in both wizard and management.
   - Code field is shown only when account numbers are on (D37)
   - Type picker is always shown; locked in wizard context to the calling step's type (D38)
   - Notes placeholder: "What is this category used for?" (D39) */
window.__editType = null;
window.__openEdit = (prefix,i)=>{
  const arr = prefix==='expenses'?state.expenses:prefix==='income'?state.income:state.other;
  const item = arr[i];
  const isOther = prefix === 'other';
  const typeFromPrefix = prefix==='expenses' ? 'Expense' : prefix==='income' ? 'Income' : (item.type || 'Asset');
  /* D38: type is locked in wizard context. We're called from the wizard here (catsStep 2/3/4 or from the management screen via __openEdit callsite — same modal, same lock semantics in the wizard; free in mgmt). */
  const inWizard = state.screen === 'cats';
  window.__editType = typeFromPrefix;
  const lineOptions = typeFromPrefix==='Income' ? IRS_INCOME_LINES : IRS_EXPENSE_LINES;
  const opts = isOther || typeFromPrefix==='Asset' || typeFromPrefix==='Liability' || typeFromPrefix==='Equity' ? '' : lineOptions.map(l=>`<option value="${l.id}" ${item.line===l.id?'selected':''}>${l.label} — ${l.desc}</option>`).join('');
  const typeOpts = ['Expense','Income','Asset','Liability','Equity'].map(t=>`<option value="${t}" ${t===typeFromPrefix?'selected':''} ${inWizard?'disabled':''}>${t}</option>`).join('');
  const buttons = item.system
    ? [{Close: 'closeModal();'}]
    : [
      {Cancel: 'closeModal();'},
      {'Merge and Delete…': `closeModal(); window.__openMerge('${prefix}',${i});`},
      {Save: `window.__commitEdit('${prefix}',${i});`}
    ];
  window.__openModal('Edit account', `
    <label>Type ${inWizard?'<span class="help" style="margin:0"> (locked — wizard context)</span>':''}</label>
    <select id="edit-type" ${inWizard?'disabled':''} onchange="window.__editType=this.value; window.__rebuildEditLine()">${typeOpts}</select>
    <label>Name</label>
    <input type="text" id="edit-name" value="${esc(item.name)}">
    ${state.showNumbers ? `
      <label>Code</label>
      <input type="text" id="edit-code" value="${esc(item.code)}">
    ` : ''}
    ${opts ? `
      <label>Tax Line Item (Schedule C of IRS Form 1040)</label>
      <select id="edit-line">${opts}</select>
      <div class="softwarn">Changing the tax line affects how this category's transactions appear on tax exports.</div>
    ` : ''}
    <label>Notes</label>
    <textarea id="edit-note" rows="2" placeholder="What is this category used for? (e.g. Dues paid to local trade association)">${esc(item.note || '')}</textarea>
  `, buttons);
};
/* re-render the line dropdown if user changes Type in management mode */
window.__rebuildEditLine = ()=>{
  const t = window.__editType || 'Expense';
  const src = t==='Income' ? IRS_INCOME_LINES : t==='Expense' ? IRS_EXPENSE_LINES : [];
  const sel = window.document.querySelector('#edit-line');
  if(!sel) return;
  sel.innerHTML = src.map(l=>`<option value="${l.id}">${l.label} — ${l.desc}</option>`).join('');
};
window.__commitEdit = (prefix, i)=>{
  const arr = prefix==='expenses'?state.expenses:prefix==='income'?state.income:state.other;
  const item = arr[i];
  if(!item) return;
  const name = (window.document.querySelector('#edit-name')||{}).value;
  const note = (window.document.querySelector('#edit-note')||{}).value;
  const lineEl = window.document.querySelector('#edit-line');
  /* D37: Code field only present when account numbers are on */
  const codeEl = window.document.querySelector('#edit-code');
  const typeEl = window.document.querySelector('#edit-type');
  if(name != null) item.name = name;
  if(codeEl && codeEl.value) item.code = codeEl.value;
  if(note != null) item.note = note;
  if(lineEl) item.line = lineEl.value;
  /* D38: type change persists in management; no-op in wizard (locked) */
  if(typeEl && !typeEl.disabled && typeEl.value){
    if(prefix==='other'){ item.type = typeEl.value; }
  }
  markDirty(prefix);
  closeModal();
  render();
};
window.__openDelete = (prefix,i)=>{
  const arr = prefix==='expenses'?state.expenses:prefix==='income'?state.income:state.other;
  const item = arr[i];
  const count = state.txnCounts[item.code] || 0;
  if(count>0){
    const others = arr.filter((x,k)=>k!==i).map(o=>`<option>${esc(o.name)}</option>`).join('');
    window.__openModal('Delete category', `
      <p><strong>${count} transaction${count===1?'':'s'}</strong> are categorized to <em>${esc(item.name)}</em>. Move them to another account first, then delete.</p>
      <label>Move to</label>
      <select>${others}</select>
    `, [{Cancel:'closeModal()'}, {'Reassign & delete':`alert('Reassigned ${count} txns and removed category. (Demo.)');closeModal();`}]);
  } else {
    window.__openModal('Delete category', `<p>Delete <em>${esc(item.name)}</em>? It has no transactions.</p>`,
      [{Cancel:'closeModal()'}, {Delete:`closeModal();`}]);
  }
};
window.__openMerge = (prefix,i)=>{
  const arr = prefix==='expenses'?state.expenses:prefix==='income'?state.income:state.other;
  const item = arr[i];
  const others = arr.filter((x,k)=>k!==i).map(o=>`<option>${esc(o.name)}</option>`).join('');
  window.__openModal('Merge and Delete category', `
    <p>All transactions on <em>${esc(item.name)}</em> will be moved to the destination category, then <em>${esc(item.name)}</em> will be deleted. Same account type required. This can't be undone.</p>
    <label>Source</label>
    <input type="text" value="${esc(item.name)}" disabled>
    <label>Destination</label>
    <select>${others}</select>
  `, [{Cancel:'closeModal()'}, {'Merge and Delete':`closeModal();`}]);
};

/* ---- DASHBOARD / SETTINGS / ROUTING ---- */
function renderDashboard(){
  $('#root').innerHTML = topbar('Dashboard',['Books']) + `<div class="box" style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:18px">
    <h2 style="margin-top:0">Welcome to Virta Books</h2>
    <p>You're set up. Quick links:</p>
    <ul>
      <li><a href="#" onclick="state.screen='setup';render()">Run setup wizard →</a></li>
      <li><a href="#" onclick="state.screen='mgmt';state.catFilter='expenses';render()">Categories — Expenses</a> <span class="pill warn">${state.reviewLaterTxnCount} on Review Later</span></li>
      <li><a href="#" onclick="state.screen='settings';render()">Settings</a></li>
    </ul>
    <div class="infobox">Review Later badge in the sidebar shows outstanding auto-categorization items. Move them to the right category from the Categorize UI.</div>
  </div>`;
  refreshBadge();
}
function renderLedger(){
  const rows = LEDGER_ROWS.map(r => `<tr>
    <td class="nowrap">${esc(r.date)}</td>
    <td><span class="pill">${esc(r.type)}</span></td>
    <td>${esc(r.name)}</td>
    <td class="right nowrap">${fmtAmount(r.amount)}</td>
    <td>${esc(r.description)}</td>
    <td>${esc(accountLabel(r.category))}</td>
    <td>${esc(accountLabel(r.matched))}</td>
    <td>${r.recon==='reconciled'?'<span class="pill system">Reconciled</span>':r.recon==='in-progress'?'<span class="pill warn">In progress</span>':'<span class="muted">—</span>'}</td>
  </tr>`).join('');
  $('#root').innerHTML = topbar('Transactions',['Books','Transactions']) + `
    <div class="ledger-summary">
      <div class="metric"><div class="label">Entries this month</div><div class="value">${LEDGER_ROWS.length}</div></div>
      <div class="metric"><div class="label">Unbalanced entries</div><div class="value">0</div></div>
      <div class="metric"><div class="label">User action needed</div><div class="value">None</div></div>
    </div>
    <div class="box" style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:18px;box-shadow:var(--shadow)">
      <div style="display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:14px">
        <div>
          <h2 style="margin:0 0 4px">Every money event, balanced behind the scenes</h2>
          <p class="help" style="margin:0;max-width:720px">Virta creates ledger entries automatically from invoices, bills, payments, bank imports, and manual journals. Most users never need to edit this page; it is here when you or an accountant needs to inspect the accounting record.</p>
        </div>
        <button onclick="window.__openManualEntry()">New entry</button>
      </div>
      <div class="infobox" style="margin-bottom:14px">Account codes, normal balances, and income/loss rollup stay behind the scenes. The user-facing concepts remain invoices, bills, payments, categories, and statements.</div>
      <table class="cat-table ledger-table">
        <thead><tr><th style="width:100px">Date</th><th style="width:92px">Type</th><th>Name</th><th class="right" style="width:110px">Amount</th><th>Description</th><th>Category</th><th>Matched with</th><th style="width:110px">Status</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  refreshBadge();
}
function renderSettings(){
  const tab = state.settingsTab || 'general';
  /* D49: settings segmented into General / Categories / Other with top-of-page tabs. */
  const tabBar = (tab) => `
    <div style="display:flex;gap:6px;border-bottom:1px solid var(--line);margin-bottom:18px">
      <button class="tab-btn ${tab==='general'?'on':''}" onclick="state.settingsTab='general';render()">General</button>
      <button class="tab-btn ${tab==='categories'?'on':''}" onclick="state.settingsTab='categories';render()">Categories</button>
      <button class="tab-btn ${tab==='other'?'on':''}" onclick="state.settingsTab='other';render()">Other</button>
    </div>
  `;
  const general = () => `
    <div class="row" style="display:block">
      <label style="margin-top:0">Your name</label>
      <input type="text" value="${esc(state.setup.proprietor||'')}" placeholder="Your legal name" oninput="state.setup.proprietor=this.value" style="max-width:420px">
    </div>
    <div class="row" style="display:block">
      <label>Business name</label>
      <input type="text" value="${esc(state.setup.business_name||'')}" placeholder="Your business name" oninput="state.setup.business_name=this.value" style="max-width:420px">
    </div>
    <div class="row" style="display:block">
      <label>Trade name <span class="muted small">(optional)</span></label>
      <input type="text" value="${esc(state.setup.trade_name||'')}" placeholder="Distinct from business name" oninput="state.setup.trade_name=this.value" style="max-width:420px">
    </div>
    <div class="row" style="display:block">
      <label>What does your business do?</label>
      <textarea rows="2" maxlength="280" placeholder="One or two sentences about what you sell or do." oninput="state.setup.description=this.value" style="max-width:520px">${esc(state.setup.description||'')}</textarea>
    </div>
    <div class="row" style="display:block">
      <label>Industry code (NAICS)</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="text" value="${esc(state.setup.naics||'')}" placeholder="Click ‘Look up’ to search by keyword" readonly style="background:#fafafa;max-width:320px">
        <button onclick="window.__openNaics()">Look up NAICS →</button>
      </div>
    </div>
    <div class="row" style="display:block">
      <label>EIN <span class="muted small">(optional)</span></label>
      <input type="text" value="${esc(state.setup.ein||'')}" placeholder="00-0000000" oninput="state.setup.ein=this.value" style="max-width:320px">
    </div>
    <div class="row" style="display:block">
      <label>Address</label>
      <input type="text" value="${esc(state.setup.addr1||'')}" placeholder="Street address" oninput="state.setup.addr1=this.value" style="max-width:520px">
      <input type="text" value="${esc(state.setup.addr2||'')}" placeholder="Street address 2" oninput="state.setup.addr2=this.value" style="max-width:520px;margin-top:4px">
      <div style="display:flex;gap:8px;margin-top:4px">
        <input type="text" value="${esc(state.setup.city||'')}" placeholder="City" oninput="state.setup.city=this.value" style="flex:1">
        <input type="text" value="${esc(state.setup.state||'')}" placeholder="State" oninput="state.setup.state=this.value" style="width:60px">
        <input type="text" value="${esc(state.setup.zip||'')}" placeholder="ZIP" oninput="state.setup.zip=this.value" style="width:100px">
      </div>
    </div>
    <div class="row"><span>Accounting method</span>
      <select onchange="state.setup.accounting_method=this.value">
        <option value="cash" ${state.setup.accounting_method==='cash'?'selected':''}>Cash (v1 default)</option>
        <option value="accrual" ${state.setup.accounting_method==='accrual'?'selected':''} disabled>Accrual (coming later)</option>
      </select>
    </div>
    <div class="row"><span>Fiscal year starts</span>
      <select onchange="state.setup.fy_month=Number(this.value)">
        ${['January','February','March','April','May','June','July','August','September','October','November','December'].map((m,i)=>`<option value="${i+1}" ${state.setup.fy_month===i+1?'selected':''}>${m}</option>`).join('')}
      </select>
    </div>
    <div class="row"><span>Business started on</span>
      <input type="date" value="${esc(state.setup.started_on||'')}" oninput="state.setup.started_on=this.value">
    </div>
    <div class="row"><span>Currency</span>
      <select onchange="state.setup.currency=this.value">
        ${['USD','CAD','EUR','GBP','AUD','MXN'].map(c => `<option ${state.setup.currency===c?'selected':''}>${c}</option>`).join('')}
      </select>
    </div>
    <div class="row"><span>Business type</span><span class="pill">Sole proprietor</span></div>
  `;
  const sortByCode = (state.catDefaultSort||'code')==='code';
  const codeSortDisabled = !state.showNumbers;
  const categories = () => `
    <div class="row" style="display:block">
      <div style="font-weight:500">Default sort</div>
      <div class="help" style="margin:2px 0 8px">How the Categories Management page sorts rows on first open. Click column headers to override for a single session.</div>
      <label style="display:flex;align-items:center;gap:8px;margin:4px 0;font-size:13.5px">
        <input type="radio" name="catDefaultSort" required ${!sortByCode?'checked':''} onchange="state.catDefaultSort='name';state.sortMgmt=null;window.__renderMgmtTable()"> Alphabetical by name
      </label>
      <label style="display:flex;align-items:center;gap:8px;margin:4px 0;font-size:13.5px${codeSortDisabled?';opacity:.5':''}">
        <input type="radio" name="catDefaultSort" required ${sortByCode?'checked':''} ${codeSortDisabled?'disabled':''} onchange="state.catDefaultSort='code';state.sortMgmt=null;window.__renderMgmtTable()"> Numerical by code ${codeSortDisabled?'<span class="muted small">(requires "Show 4-digit account numbers")</span>':''}
      </label>
    </div>
    <div class="row" style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div>Show 4-digit account numbers</div>
        <div class="help" style="margin:0">Some accountants and business owners like to track their accounts with account numbers. Turn on to show codes like 6000 Advertising next to each category.</div>
      </div>
      <div class="switch ${state.showNumbers?'on':''}" onclick="state.showNumbers=!state.showNumbers;render()"></div>
    </div>
    <div class="row"><span>Review Later badge in sidebar</span><div class="switch on"></div></div>
  `;
  const other = () => `
    <div class="row"><span>Accounting method</span><span class="pill">Cash</span> <span class="muted small">(v1 only; accrual coming later)</span></div>
    <div class="row"><span>Fiscal year start</span><span class="pill">January</span></div>
    <div class="row"><span>Business type</span><span class="pill">Sole proprietor</span></div>
    <div class="row"><span>Run setup wizard again</span><button onclick="state.setupStep=1;state.screen='setup';render()">Start over →</button></div>
  `;
  const body = tab==='general' ? general() : tab==='categories' ? categories() : other();
  $('#root').innerHTML = topbar('Settings',['Books','Settings']) + `<div class="settings">${tabBar(tab)}<h3 style="margin-top:0">${tab==='general'?'General':tab==='categories'?'Categories':'Other'}</h3>${body}</div>`;
  refreshBadge();
}

/* ---- ROUTING ---- */
state.screen = state.screen || 'dashboard';
function render(){
  const s = state.screen;
  if(s==='setup') return renderSetup();
  if(s==='cats') return renderCats();
  if(s==='mgmt') return renderMgmt();
  if(s==='dashboard') return renderDashboard();
  if(s==='ledger') return renderLedger();
  if(s==='transactions') return renderLedger(); /* round 16: GL merged into Transactions nav */
  if(s==='settings') return renderSettings();
  renderSettings();
}
document.addEventListener('click', (e)=>{
  const a = e.target.closest('a[data-screen]');
  if(!a) return;
  e.preventDefault();
  const k = a.getAttribute('data-screen');
  state.screen = k;
  render();
});
window.addEventListener('DOMContentLoaded', render);


</script>
</body>
